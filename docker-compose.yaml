services:
  dns-server:
    build: .
    container_name: bind9_dns
    ports:
      - "53:53/udp"
      - "53:53/tcp"
    volumes:
      - ./config:/etc/bind
      - ./zones:/var/lib/bind
    restart: always
  web-ui:
    build: ./web_ui
    container_name: dns_web_ui
    ports:
      - "5000:5000"
    depends_on:
      - dns-server